<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with me through this contact form.">
    <title>My Mini Project | Contact Me</title>
    <link rel="stylesheet" href="IndexStyle.css">
</head>
<body>
    
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="index.html" class="logo">WebDev Project</a>
                <button class="menu-toggle" id="menuToggle">☰</button>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="AboutMeIndex.html">About Me</a></li>
                    <li><a href="ProjectsIndex.html">My Projects</a></li>
                    <li><a href="ContactsIndex.html" class="active">Contact Me</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="page-content">
            <h1>Contact Me</h1>
            <p>Fill out the form below to send a message. Leave no blanks.</p>

            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                    <span class="error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                    <span class="error" id="messageError"></span>
                </div>

                <button type="submit" class="btn">Send Message</button>
                <p id="formSuccess" class="success-msg"></p>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Ignaico Blueicko | Web Development Mini Project</p>
        </div> 
    </footer>

    <script src="IndexScript.js"></script>
</body>
</html>
